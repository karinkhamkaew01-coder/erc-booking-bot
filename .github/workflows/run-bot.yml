name: Monitor Queue 1-Min

on:
  schedule:
    - cron: '*/1 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-queue:
    runs-on: ubuntu-latest
    
    # เพิ่มคำสั่งตรงนี้เพื่อบอก GitHub ให้ใช้ Node 24 และปิดคำเตือนสีเหลือง
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Run Monitor Script
        env:
          LINE_ACCESS_TOKEN: ${{ secrets.LINE_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        run: python queue_monitor.py
        
      - name: Commit and Push state file
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add previous_slots.json
          git diff --quiet && git diff --staged --quiet || git commit -m "Update queue state"
          git push

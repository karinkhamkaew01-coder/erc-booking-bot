name: Monitor Queue 1-Min

on:
  schedule:
    - cron: '*/1 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-queue:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install Thai Fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-thai-tlwg
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      # สเต็ปที่ 1: บอทเช็คคิวและบันทึกรูปภาพ
      - name: Run Monitor Script
        env:
          LINE_ACCESS_TOKEN: ${{ secrets.LINE_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        run: python queue_monitor.py
        
      # สเต็ปที่ 2: ดันรูปภาพและสถานะขึ้นอินเทอร์เน็ต (GitHub) ให้เรียบร้อยก่อน
      - name: Commit and Push state file
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add previous_slots.json error_screenshot.png current_state.png pending_message.json
          git diff --quiet && git diff --staged --quiet || git commit -m "Update queue state and screenshots"
          git push

      # สเต็ปที่ 3: สั่งยิง LINE หาเรา (คราวนี้รูปภาพจะดึงขึ้นเต็มร้อยเปอร์เซ็นต์)
      - name: Send LINE Notification
        env:
          LINE_ACCESS_TOKEN: ${{ secrets.LINE_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        run: python queue_monitor.py --send

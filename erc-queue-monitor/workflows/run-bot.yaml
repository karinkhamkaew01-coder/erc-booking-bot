name: Monitor Queue 1-Min

on:
  schedule:
    - cron: '*/1 * * * *' # รันทุกๆ 1 นาที
  workflow_dispatch:

# อนุญาตให้ Actions เขียนไฟล์ลง Repository ได้
permissions:
  contents: write 

jobs:
  check-queue:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install selenium requests webdriver-manager
          
      - name: Run Monitor Script
        env:
          LINE_TOKEN: ${{ secrets.LINE_TOKEN }}
        run: python queue_monitor.py
        
      - name: Commit and Push state file
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add previous_slots.json
          # Commit ข้อมูล ถ้าไม่มีอะไรเปลี่ยนก็ไม่ต้อง Commit
          git diff --quiet && git diff --staged --quiet || git commit -m "Update queue state"
          git push